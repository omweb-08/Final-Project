<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel — FabriTech</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
}

.glass-nav{
background:rgba(255,255,255,0.98);
backdrop-filter:blur(10px);
}

.login-card{
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
}

.card-hover{
transition:0.3s;
}

.card-hover:hover{
transform:translateY(-5px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

</style>

</head>

<body class="text-slate-900 min-h-screen">


<!-- LOGIN SCREEN -->

<div id="loginScreen"
class="fixed inset-0 bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center z-[100] px-4">

<div class="login-card p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full">

<div class="text-center mb-10">

<div class="flex justify-center mb-4">
<img src="/images/logo1.png" style="height:50px;border-radius:50%;">
</div>

<h2 class="text-3xl font-extrabold text-slate-900">
Admin Portal
</h2>

<p class="text-slate-500 text-sm">
FabriTech Management Dashboard
</p>

</div>


<form id="loginForm" class="space-y-6">

<div class="relative">

<i class="fa-solid fa-user absolute left-4 top-4 text-slate-400"></i>

<input required id="admUser" type="text" placeholder="Username"
class="w-full pl-12 pr-5 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-600">

</div>


<div class="relative">

<i class="fa-solid fa-lock absolute left-4 top-4 text-slate-400"></i>

<input required id="admPass" type="password" placeholder="Password"
class="w-full pl-12 pr-5 py-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-600">

</div>


<p id="loginFail"
class="hidden text-red-500 text-xs font-bold text-center">
Invalid login details.
</p>


<button type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-xl shadow-xl transition-all hover:scale-[1.02]">

<i class="fa-solid fa-right-to-bracket"></i>
Login to Dashboard

</button>

</form>

</div>

</div>



<!-- DASHBOARD -->

<div id="adminDashboard" class="hidden">


<header class="glass-nav border-b border-slate-200 sticky top-0 z-50">

<div class="container mx-auto px-4 py-3 flex items-center justify-between">

<h1 class="text-xl font-bold">
Admin Dashboard
</h1>

<button onclick="logout()"
class="text-sm font-bold text-red-600 bg-red-50 px-5 py-2 rounded-xl hover:bg-red-100">

Logout

</button>

</div>

</header>



<main class="py-12">

<div class="container mx-auto px-4 max-w-6xl">



<!-- STATS -->

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">

<div class="card-hover bg-white p-6 rounded-2xl shadow text-center">

<i class="fa-solid fa-database text-3xl text-blue-600 mb-3"></i>

<h3 class="text-lg font-bold">Total Inquiries</h3>

<p id="totalCount"
class="text-3xl font-extrabold mt-2">
0
</p>

</div>


<div class="card-hover bg-green-50 p-6 rounded-2xl shadow text-center">

<i class="fa-solid fa-check-circle text-3xl text-green-600 mb-3"></i>

<h3 class="text-lg font-bold text-green-700">
Replied
</h3>

<p id="repliedCount"
class="text-3xl font-extrabold mt-2 text-green-700">
0
</p>

</div>


<div class="card-hover bg-amber-50 p-6 rounded-2xl shadow text-center">

<i class="fa-solid fa-clock text-3xl text-amber-600 mb-3"></i>

<h3 class="text-lg font-bold text-amber-700">
Pending
</h3>

<p id="pendingCount"
class="text-3xl font-extrabold mt-2 text-amber-700">
0
</p>

</div>

</div>



<!-- SEARCH -->

<div class="mb-8">

<input id="searchInput"
oninput="loadInquiries()"
type="text"

placeholder="Search by name or phone..."

class="w-full px-5 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none">

</div>



<div id="inquiryList" class="space-y-6"></div>


</div>

</main>

</div>



<script>

const STORAGE_KEY="fabri_inquiries";


// LOGIN

document.getElementById('loginForm').addEventListener('submit',function(e){

e.preventDefault();

if(admUser.value==='admin' && admPass.value==='admin123'){

loginScreen.classList.add('hidden');

adminDashboard.classList.remove('hidden');

loadInquiries();

}else{

loginFail.classList.remove('hidden');

}

});


function logout(){

adminDashboard.classList.add('hidden');

loginScreen.classList.remove('hidden');

}



// LOAD INQUIRIES

async function loadInquiries(){

const list=document.getElementById('inquiryList');

const searchInput=document.getElementById('searchInput');

const search=searchInput?searchInput.value.toLowerCase():"";

try{

const response=await fetch('/api/contact');

let data=await response.json();

document.getElementById('totalCount').innerText=data.length;

document.getElementById('repliedCount').innerText=data.filter(i=>i.reply).length;

document.getElementById('pendingCount').innerText=data.filter(i=>!i.reply).length;


if(search){

data=data.filter(i=>

(i.name && i.name.toLowerCase().includes(search)) ||

(i.phone && i.phone.includes(search))

);

}


if(data.length===0){

list.innerHTML=`<div class="bg-white p-12 rounded-3xl text-center shadow">No inquiries found.</div>`;

return;

}


list.innerHTML=data.map(item=>`

<div class="card-hover bg-white p-8 rounded-3xl shadow border mb-6">

<div class="flex justify-between items-center mb-4">

<div>

<h3 class="text-xl font-bold">${item.name}</h3>

<p class="text-sm text-slate-500">${item.phone} • ${item.email}</p>

</div>

<span class="px-3 py-1 text-xs font-bold rounded-full ${item.reply ? 'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}">

${item.reply?'Replied':'Pending'}

</span>

</div>


<p class="bg-slate-50 p-4 rounded-xl mb-4">${item.message}</p>


<div class="flex gap-3 mb-4">

<button onclick="toggleReply('${item._id}')"

class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700">

${item.reply?'Edit Reply':'Reply'}

</button>


<button onclick="deleteInquiry('${item._id}')"

class="bg-red-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-red-700">

Delete

</button>

</div>


<div id="replyBox-${item._id}" class="hidden mt-4 p-4 border-t border-slate-100">

<textarea id="reply-${item._id}"

class="w-full border border-slate-200 p-3 rounded-xl mb-3 focus:ring-2 focus:ring-blue-500 outline-none"

rows="3"

placeholder="Type your reply here...">${item.reply||''}</textarea>

<button onclick="submitReply('${item._id}')"

class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl font-bold">

Save & Send Email

</button>

</div>


${item.reply?`

<div class="mt-4 bg-green-50 border border-green-200 p-4 rounded-xl text-green-800">

<strong>Admin Reply:</strong> ${item.reply}

</div>`:''}

</div>

`).join('');

}catch(err){

console.error("Fetch Error:",err);

list.innerHTML=`<div class="text-red-500 p-4 text-center">Error connecting to server.</div>`;

}

}



function toggleReply(id){

const box=document.getElementById('replyBox-'+id);

if(box) box.classList.toggle('hidden');

}



async function submitReply(id){

const replyText=document.getElementById('reply-'+id).value.trim();

if(!replyText) return alert("Please type a message before sending.");

try{

const response=await fetch(`/api/inquiries/reply/${id}`,{

method:'PUT',

headers:{'Content-Type':'application/json'},

body:JSON.stringify({reply:replyText})

});

if(response.ok){

alert("Success! Reply saved and email sent to customer.");

loadInquiries();

}

}catch(err){

alert("Could not connect to the server.");

}

}



async function deleteInquiry(id){

if(!confirm("Are you sure you want to delete this inquiry?")) return;

try{

const response=await fetch(`/api/inquiries/${id}`,{method:'DELETE'});

if(response.ok) loadInquiries();

}catch(err){

alert("Delete failed.");

}

}

</script>

</body>
</html>
